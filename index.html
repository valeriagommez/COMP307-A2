    <!-- start of the third row -->
    <div class="third-row">
        <div class="column">
            <div class="hero-card">
                <img class="hero-img" src="images/clock.png">
                <!-- https://www.flaticon.com/free-icon/calendar_15443006 -->
                <h2>245 million</h2>
                <p class="card-text">Is the amount of years during which dinosaurs roamed the Earth</p>
            </div>
        </div>

        <div class="column">
            <div class="hero-card">
                <img class="hero-img" src="images/fossil.png">
                <!-- https://www.freepik.com/icon/fossil_472770 -->
                <h2>700</h2>
                <p class="card-text">Is the roughly the number of dinosaur species found to date.</p>
            </div>
        </div>

        <div class="column">
            <div class="hero-card">
                <img class="hero-img" src="images/sauropod.png">
                <!-- https://www.freepik.com/icon/europasaurus_8572743#fromView=keyword&page=1&position=14&uuid=4acaf718-e976-4edb-8270-0881261b7a8c -->
                <h2>18 m</h2>
                <p class="card-text">Is roughly the size of an adult Sauropod, the largest animals that have ever existed!</p>
            </div>
        </div>
    </div>
